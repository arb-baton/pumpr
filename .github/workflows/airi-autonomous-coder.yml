name: Airi autonomous coder

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch Airi should write to"
        required: false
        default: "airi/self-improvements"
      auto_merge:
        description: "Merge into main after guard and checks pass"
        required: false
        default: "true"
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: airi-autonomous-coder
  cancel-in-progress: false

jobs:
  code:
    runs-on: ubuntu-latest
    env:
      AIRI_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'airi/self-improvements' }}
      AIRI_AUTO_MERGE: ${{ github.event_name == 'workflow_dispatch' && inputs.auto_merge || 'true' }}
      AIRI_BASE_REF: origin/main
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_AIRI_CODER_MODEL: ${{ vars.OPENAI_AIRI_CODER_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      OPENAI_AIRI_TWEET_MODEL: ${{ vars.OPENAI_AIRI_TWEET_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      AIRI_X_COOKIE: ${{ secrets.AIRI_X_COOKIE || secrets.AIRI_TWITTER_COOKIE || secrets.TWITTER_X_COOKIE || secrets.X_COOKIE || secrets.TWEXAPI_X_COOKIE }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install browser auditor
        run: |
          npm install --no-save --package-lock=false playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: Audit live UI before coding
        continue-on-error: true
        env:
          AIRI_UI_AUDIT_BASE_URL: ${{ vars.AIRI_UI_AUDIT_BASE_URL || 'https://pump-r.fun' }}
          AIRI_UI_AUDIT_OUTPUT: .airi-ui-audit.json
          AIRI_UI_AUDIT_REPORT_ISSUES: "false"
          AIRI_UI_AUDIT_SOFT_FAIL: "true"
          AIRI_UI_AUDIT_FAIL_ON: none
        run: node scripts/airi-ui-audit.js

      - name: Prepare Airi branch
        shell: bash
        run: |
          git config user.name "Airi"
          git config user.email "airi@pump-r.fun"
          git fetch origin main
          git checkout -B "$AIRI_BRANCH" origin/main

      - name: Let Airi write one safe patch
        id: write
        shell: bash
        run: |
          HEAD_MESSAGE="$(git log -1 --pretty=%B || true)"
          if [[ "$GITHUB_EVENT_NAME" == "push" && ( "$HEAD_MESSAGE" == *"Airi: autonomous self-improvement"* || "$HEAD_MESSAGE" == *"Merge Airi autonomous self-improvement"* ) ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Airi's own self-improvement push to avoid a loop."
            exit 0
          fi
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY is not configured. Airi cannot write code yet."
            exit 0
          fi
          if ! node scripts/airi-autonomous-coder.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Airi could not produce a valid safe patch this cycle. Skipping without failing the workflow."
            exit 0
          fi
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Airi found no useful safe patch this cycle."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --name-only
          fi

      - name: Stage and guard Airi diff
        if: steps.write.outputs.changed == 'true'
        shell: bash
        run: |
          git diff --name-only -z | xargs -0 git add --
          AIRI_COMPARE_INDEX=1 AIRI_BRANCH="$AIRI_BRANCH" node scripts/airi-merge-guard.js

      - name: Syntax checks
        if: steps.write.outputs.changed == 'true'
        shell: bash
        run: |
          node --check backend/server.js
          node --check scripts/airi-autonomous-coder.js
          node --check scripts/airi-merge-guard.js
          node --check frontend/js/sidebar.js
          if [ -f frontend/js/assistant.js ]; then
            node --input-type=module --check < frontend/js/assistant.js
          fi
          if [ -f frontend/js/airi-live.js ]; then
            node --input-type=module --check < frontend/js/airi-live.js
          fi

      - name: Full validation before push
        if: steps.write.outputs.changed == 'true'
        shell: bash
        run: |
          npm run compile
          node backend/server.js > /tmp/airi-ui-server.log 2>&1 &
          AIRI_SERVER_PID=$!
          trap 'kill $AIRI_SERVER_PID 2>/dev/null || true' EXIT
          SERVER_READY=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/airi >/dev/null 2>&1; then
              SERVER_READY=true
              break
            fi
            sleep 1
          done
          if [ "$SERVER_READY" != "true" ]; then
            echo "Local Pump-r server did not become ready for Airi UI audit."
            cat /tmp/airi-ui-server.log || true
            exit 1
          fi
          AIRI_UI_AUDIT_BASE_URL=http://127.0.0.1:4173 AIRI_UI_AUDIT_OUTPUT=.airi-ui-audit-after.json AIRI_UI_AUDIT_REPORT_ISSUES=false node scripts/airi-ui-audit.js
          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            npx vercel build --prod --yes
          else
            echo "Skipping Vercel build validation because Vercel secrets are not fully configured."
          fi
          git diff --cached --check

      - name: Commit and push Airi branch after validation
        if: steps.write.outputs.changed == 'true'
        shell: bash
        run: |
          git commit -m "Airi: autonomous self-improvement"
          git push --force-with-lease origin "HEAD:$AIRI_BRANCH"

      - name: Merge guarded branch into main
        if: steps.write.outputs.changed == 'true' && env.AIRI_AUTO_MERGE == 'true'
        shell: bash
        run: |
          git fetch origin main
          git checkout "$AIRI_BRANCH"
          AIRI_BASE_REF=origin/main AIRI_BRANCH="$AIRI_BRANCH" node scripts/airi-merge-guard.js
          git checkout main
          git pull --ff-only origin main
          git merge --no-ff "$AIRI_BRANCH" -m "Merge Airi autonomous self-improvement"
          git push origin main

      - name: Deploy merged Airi changes to Vercel
        if: steps.write.outputs.changed == 'true' && env.AIRI_AUTO_MERGE == 'true' && env.VERCEL_TOKEN != ''
        shell: bash
        run: npm run deploy:prod

      - name: Tweet merged Airi fix
        if: steps.write.outputs.changed == 'true' && env.AIRI_AUTO_MERGE == 'true'
        continue-on-error: true
        shell: bash
        env:
          AIRI_TWEET_MODE: push
          AIRI_TWEET_CONTEXT: "Airi shipped and merged a tested self-improvement into Pump-r."
          AIRI_TWEET_FORCE: "true"
          AIRI_TWEET_UI_FIRST: ${{ vars.AIRI_TWEET_UI_FIRST || 'true' }}
          AIRI_TWEET_HISTORY_PATH: .airi-tweet-history.json
        run: node scripts/airi-tweet-on-push.js

      - name: Upload Airi UI audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: airi-ui-audit-${{ github.run_id }}
          path: |
            .airi-ui-audit.json
            .airi-ui-audit-after.json
          if-no-files-found: ignore
