name: Airi world pulse

on:
  workflow_dispatch:
    inputs:
      context:
        description: "Optional signal Airi should think from"
        required: false
        default: ""
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: read

concurrency:
  group: airi-world-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    env:
      AIRI_TWEET_ENABLED: ${{ vars.AIRI_TWEET_ENABLED || 'true' }}
      AIRI_TWEET_DRY_RUN: ${{ vars.AIRI_TWEET_DRY_RUN || 'false' }}
      AIRI_TWEET_MODE: world
      AIRI_TWEET_CONTEXT: ${{ github.event.inputs.context || '' }}
      AIRI_TWEET_HISTORY_PATH: .airi-tweet-history.json
      AIRI_TWEET_REQUIRE_POST: ${{ vars.AIRI_TWEET_REQUIRE_POST || 'true' }}
      AIRI_TWEET_MAX_CHARS: ${{ vars.AIRI_TWEET_MAX_CHARS || '180' }}
      AIRI_WORLD_POST_CHANCE: ${{ vars.AIRI_WORLD_POST_CHANCE || '0.7' }}
      AIRI_WORLD_MIN_HOURS: ${{ vars.AIRI_WORLD_MIN_HOURS || '3' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_AIRI_TWEET_MODEL: ${{ vars.OPENAI_AIRI_TWEET_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      TWEXAPI_ALLOW_AUTO_COOKIE: ${{ vars.TWEXAPI_ALLOW_AUTO_COOKIE || 'false' }}
      TWEXAPI_BEARER_TOKEN: ${{ secrets.TWEXAPI_BEARER_TOKEN || secrets.TWITTERX_API_KEY || secrets.TWEX_API_KEY || secrets.AIRI_TWEX_API_KEY || secrets.AIRI_TWITTERX_API_KEY }}
      TWEXAPI_X_COOKIE: ${{ secrets.TWEXAPI_X_COOKIE || secrets.TWITTER_X_COOKIE || secrets.X_COOKIE || secrets.AIRI_X_COOKIE || secrets.AIRI_TWITTER_COOKIE }}
      TWEXAPI_PROXY: ${{ secrets.TWEXAPI_PROXY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore Airi tweet memory
        uses: actions/cache/restore@v4
        with:
          path: .airi-tweet-history.json
          key: airi-tweet-history-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            airi-tweet-history-

      - name: Let Airi watch the world
        run: node scripts/airi-tweet-on-push.js

      - name: Save Airi tweet memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .airi-tweet-history.json
          key: airi-tweet-history-${{ github.run_id }}-${{ github.run_attempt }}
